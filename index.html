<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>失控的输入框 - 多机制复合破坏版</title>
    <style>
        * { box-sizing: border-box; background-color: #ffffff; color: #000000; font-family: 'Courier New', Courier, monospace; }
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        #game-container { width: 80%; max-width: 600px; text-align: center; position: relative; }
        #hint { font-size: 1.5rem; margin-bottom: 40px; line-height: 1.6; letter-spacing: 2px; }
        #input-area { position: relative; height: 100px; }
        input[type="text"] { border: 2px solid #000000; padding: 10px 15px; font-size: 1.2rem; width: 250px; outline: none; text-align: center; transition: all 0.2s; }
        button { border: 2px solid #000000; padding: 10px 25px; font-size: 1.2rem; cursor: pointer; margin-left: 10px; background: #fff; }
        button:hover { background-color: #000000; color: #ffffff; }
        #level-indicator { position: absolute; top: 40px; left: 40px; font-size: 1rem; border-bottom: 1px solid #000000; }
        #dev-door { position: absolute; bottom: 20px; left: 20px; width: 30px; height: 30px; cursor: pointer; opacity: 0; background-color: transparent; }
        ::selection { background: #000000; color: #ffffff; }
    </style>
</head>
<body>
    <div id="level-indicator">STAGE: 01</div>
    <div id="game-container">
        <div id="hint">加载中...</div>
        <div id="input-area">
            <input type="text" id="answer-input" autocomplete="off" placeholder="在此处输入...">
            <button id="submit-btn">SUBMIT</button>
        </div>
    </div>
    <div id="dev-door" title="作者后门"></div>

    <script>
        const levels = [
            {
                id: 1,
                hint: "游戏开始了。真正的线索往往隐藏在看不见的地方，比如这个括号里：{ANSWER}。你应该知道要输入什么了吧？ {SECRET}",
                answerToken: "QU5TV0VS",
                init: function() {
                    let rawText = hintEl.textContent; let processedHtml = rawText.replace(/\{([^}]+)\}/g, (m,p1)=>`<span style="color:#fff;background:transparent">${p1}</span>`); hintEl.innerHTML = processedHtml;
                },
                clear: function() {
                    hintEl.innerHTML = hintEl.textContent.replace(/[{}]/g, '');
                }
            },
            {
                id: 2,
                hint: "【请听题】什么英文字母是大多数人天天都在看，但在这里你却偏偏看不见的？",
                answerToken: "d2hpdGU=",
                init: function() {
                    inputEl.style.color = '#ffffff'; inputEl.style.caretColor = '#000000';
                },
                clear: function() {
                    inputEl.style.color = '#000000';
                }
            },
            {
                id: 3,
                hint: "逃跑的不是输入框，而是时间。提示：键盘上由「Q」开始往右数，第五个字母是什么？（在它逃跑前抓住它！）",
                answerToken: "dA==",
                init: function() {
                    inputEl._origPos = {pos:inputEl.style.position, left:inputEl.style.left, top:inputEl.style.top}; inputEl.onmouseenter = () => { inputEl.style.position='fixed'; inputEl.style.left=Math.random()*(window.innerWidth-250)+'px'; inputEl.style.top=Math.random()*(window.innerHeight-50)+'px'; };
                },
                clear: function() {
                    inputEl.onmouseenter = null; if(inputEl._origPos){ inputEl.style.position=inputEl._origPos.pos; inputEl.style.left=inputEl._origPos.left; inputEl.style.top=inputEl._origPos.top; delete inputEl._origPos; }
                }
            },
            {
                id: 4,
                hint: "这个谜题需要你保持绝对的小写：单词「happy」的反义词是「sad」。但由于大写锁定的存在，你该如何提交正确的全大写答案？      {第一题已告诉你答案}",
                answerToken: "UFVCTElD",
                init: function() {
                    inputEl._upperHandler = function(){ this.value = this.value.toUpperCase(); }; inputEl.addEventListener('input', inputEl._upperHandler);
                },
                clear: function() {
                    if(inputEl._upperHandler){ inputEl.removeEventListener('input', inputEl._upperHandler); delete inputEl._upperHandler; }
                }
            },
            {
                id: 5,
                hint: "密码是一个经典的英文回文单词（正着读倒着读都一样）。它的意思是「雷达」。请注意：本关你的输入会被颠倒！",
                answerToken: "cmFkYXI=",
                init: function() {
                    inputEl._backHandler = function(e){ if(e.inputType!=='deleteContentBackward'){ this.value = this.value.split('').reverse().join(''); } }; inputEl.addEventListener('input', inputEl._backHandler);
                },
                clear: function() {
                    if(inputEl._backHandler){ inputEl.removeEventListener('input', inputEl._backHandler); delete inputEl._backHandler; }
                }
            },
            {
                id: 6,
                hint: "【数数题】输入框里住进了一只每0.2秒敲一下键盘的幽灵。请忽略那些随机数字，数一数本条提示信息中一共有几个英文问号？？？",
                answerToken: "NA==",
                init: function() {
                    inputEl._ghostTimer = setInterval(()=>{ inputEl.value += Math.floor(Math.random()*10); }, 200);
                },
                clear: function() {
                    if(inputEl._ghostTimer){ clearInterval(inputEl._ghostTimer); delete inputEl._ghostTimer; }
                }
            },
            {
                id: 7,
                hint: "【盲打测试】鼠标只要晃动，你打的字就会消失。在绝对的静止中，输入电脑键盘第一行正中间的那两个字母。",
                answerToken: "dHk=",
                init: function() {
                    window._onMouseMoveRiddle = ()=>{ inputEl.value=''; }; window.addEventListener('mousemove', window._onMouseMoveRiddle);
                },
                clear: function() {
                    if(window._onMouseMoveRiddle){ window.removeEventListener('mousemove', window._onMouseMoveRiddle); delete window._onMouseMoveRiddle; }
                }
            },
            {
                id: 8,
                hint: "提示：不要去碰那个闪避的SUBMIT按钮！因为只要你碰它，输入框就会被清空。用别的键盘按键来提交答案吧。",
                answerToken: "ZW50ZXI=",
                init: function() {
                    let rawText = hintEl.textContent; let processedHtml = rawText.replace(/\{([^}]+)\}/g, (m,p1)=>`<span style="color:#fff;background:transparent">${p1}</span>`); hintEl.innerHTML = processedHtml;
                    submitBtn.onmouseenter = ()=>{ inputEl.value=''; };
                },
                clear: function() {
                    hintEl.innerHTML = hintEl.textContent.replace(/[{}]/g, '');
                    submitBtn.onmouseenter = null;
                }
            },
            {
                id: 9,
                hint: "在天翻地覆的旋转中保持冷静。谜底是：当整个世界旋转180度倒过来时，数字「69」看起来会变成什么？",
                answerToken: "Njk=",
                init: function() {
                    document.body.style.transition='transform .5s'; document.body._rotState=0; document.body._rotTimer=setInterval(()=>{ document.body._rotState=document.body._rotState===0?180:0; document.body.style.transform=`rotate(${document.body._rotState}deg)`; },3000);
                },
                clear: function() {
                    if(document.body._rotTimer){ clearInterval(document.body._rotTimer); delete document.body._rotTimer; } document.body.style.transform='rotate(0deg)';
                }
            },
            {
                id: 10,
                hint: "最后一关，取每个题目的答案的首字母加起来",
                answerToken: "QXd0UHI0dGU2QQ==",
                init: function() {
                    let rawText = hintEl.textContent; let processedHtml = rawText.replace(/\{([^}]+)\}/g, (m,p1)=>`<span style="color:#fff;background:transparent">${p1}</span>`); hintEl.innerHTML = processedHtml;
                    inputEl._backHandler = function(e){ if(e.inputType!=='deleteContentBackward'){ this.value = this.value.split('').reverse().join(''); } }; inputEl.addEventListener('input', inputEl._backHandler);
                    inputEl._shrinkW=250; inputEl._shrinkHandler=()=>{ inputEl._shrinkW=Math.max(50,inputEl._shrinkW-30); inputEl.style.width=inputEl._shrinkW+'px'; }; window.addEventListener('shrink-fail', inputEl._shrinkHandler);
                },
                clear: function() {
                    hintEl.innerHTML = hintEl.textContent.replace(/[{}]/g, '');
                    if(inputEl._backHandler){ inputEl.removeEventListener('input', inputEl._backHandler); delete inputEl._backHandler; }
                    if(inputEl._shrinkHandler){ window.removeEventListener('shrink-fail', inputEl._shrinkHandler); delete inputEl._shrinkHandler; } inputEl.style.width='250px';
                }
            }
        ];

        let currentLevelIndex = 0;
        const hintEl = document.getElementById('hint');
        const inputEl = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const levelIndicator = document.getElementById('level-indicator');

        // 反调试检测（仅当打开开发者工具并暂停时才会触发加载）
        setInterval(function() {
            const startTime = performance.now(); 
            debugger; 
            const endTime = performance.now();
            if (endTime - startTime > 100) { 
                loadLevel(currentLevelIndex); 
            }
        }, 1000);

        // 禁用右键菜单
        document.oncontextmenu = () => false;

        // 禁用开发者工具快捷键
        window.onkeydown = function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i')) {
                alert("安全协议锁死。"); 
                return false;
            }
        };

        function loadLevel(index) {
            if (index >= levels.length) {
                hintEl.innerHTML = "恭喜，你用智慧击败了整个网页！";
                inputEl.style.display = 'none'; 
                submitBtn.style.display = 'none';
                levelIndicator.innerText = "END"; 
                return;
            }
            // 清理上一关的机制效果
            if (index > 0) {
                try { levels[index - 1].clear(); } catch(e) { console.warn('清理出错:', e); }
            }
            const currentLevel = levels[index];
            levelIndicator.innerText = "STAGE: " + String(currentLevel.id).padStart(2, '0');
            hintEl.innerHTML = currentLevel.hint;
            inputEl.value = "";
            // 初始化本关机制
            try { currentLevel.init(); } catch(e) { console.warn('初始化出错:', e); }
        }

        function checkAnswer() {
            const currentLevel = levels[currentLevelIndex];
            const userAnswer = inputEl.value;
            const correctAnswer = atob(currentLevel.answerToken);
            
            if (userAnswer === correctAnswer || userAnswer === "SKIP") {
                alert("ACCESS GRANTED.");
                currentLevelIndex++;
                loadLevel(currentLevelIndex);
            } else {
                alert("WRONG ANSWER.");
                // 触发 shrink 机制的失败事件
                window.dispatchEvent(new Event('shrink-fail'));
            }
        }

        // 作者暗门（调试用）
        document.getElementById('dev-door').onclick = function() {
            const target = prompt("【作者暗门】跳到第几关？");
            if (target && !isNaN(target)) {
                currentLevelIndex = Math.max(0, parseInt(target) - 1);
                loadLevel(currentLevelIndex);
            }
        };

        submitBtn.onclick = checkAnswer;
        inputEl.onkeydown = (e) => { if (e.key === 'Enter') checkAnswer(); };
        
        // 页面加载完成后初始化第一关
        loadLevel(currentLevelIndex);
    </script>
</body>
</html>
